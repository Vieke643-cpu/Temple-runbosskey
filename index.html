<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boss Key · Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #game-view, #cover-view {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #game-view { z-index: 1; }
    #cover-view {
      z-index: 2;
      display: none;
      background: #0d0d1a;
    }

    #game-view iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #cover-view img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #0d0d1a;
    }

    /* Setup overlay */
    #upload-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 25, 0.94);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: #fff;
      font-family: Arial, sans-serif;
      backdrop-filter: blur(3px);
    }

    .setup-box {
      background: #17173a;
      border: 1px solid #3a3a6a;
      border-radius: 18px;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 380px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
      max-height: 90vh;
      overflow-y: auto;
    }

    .setup-box h2 {
      font-size: 1.4rem;
      color: #7effc5;
      text-align: center;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .setup-box p {
      font-size: 0.85rem;
      color: #9a9ac0;
      text-align: center;
      margin-top: -6px;
    }

    .setup-box label {
      font-size: 0.82rem;
      color: #c8c8f0;
      font-weight: 500;
      margin-top: 4px;
    }

    .setup-box input[type="file"],
    .setup-box input[type="text"],
    .setup-box select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 9px;
      border: 1px solid #3a3a6a;
      background: #0f0f28;
      color: #eee;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }

    .setup-box select option {
      background: #0f0f28;
    }

    .setup-box input[type="file"]::file-selector-button {
      background: #2a2a5a;
      color: #b0b0f0;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      margin-right: 12px;
      cursor: pointer;
    }

    .setup-box input[type="text"] {
      text-transform: uppercase;
      text-align: center;
      letter-spacing: 2.5px;
      font-weight: 600;
      background: #0a0a1e;
      border-color: #5a5a9a;
    }

    .setup-box input[type="text"]:focus,
    .setup-box select:focus {
      border-color: #7effc5;
      box-shadow: 0 0 0 2px rgba(126, 255, 197, 0.2);
    }

    .game-preview {
      background: #12122e;
      border: 1px solid #2e2e5a;
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .game-preview span { font-size: 1.8rem; }
    .game-preview div { font-size: 0.85rem; color: #b0b0d0; }
    .game-preview strong { color: #7effc5; font-size: 0.95rem; }

    .setup-box button {
      padding: 12px;
      background: #7effc5;
      color: #0d0d22;
      font-weight: bold;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 6px;
      transition: 0.2s;
      letter-spacing: 0.5px;
    }

    .setup-box button:hover {
      background: #5de8ad;
      transform: scale(0.98);
    }

    /* Panic button */
    #panic-btn {
      position: fixed;
      bottom: 70px;
      right: 16px;
      z-index: 15;
      background: rgba(255, 50, 50, 0.85);
      color: #fff;
      font-size: 13px;
      font-weight: bold;
      padding: 10px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      backdrop-filter: blur(2px);
      border: 2px solid rgba(255, 255, 255, 0.2);
      transition: 0.2s;
      user-select: none;
      box-shadow: 0 4px 20px rgba(255, 0, 0, 0.3);
      letter-spacing: 0.5px;
    }

    #panic-btn:hover {
      background: rgba(255, 0, 0, 0.95);
      transform: scale(1.05);
      box-shadow: 0 4px 30px rgba(255, 0, 0, 0.5);
    }

    #panic-btn .key-hint {
      font-size: 10px;
      opacity: 0.7;
      font-weight: normal;
    }

    #hud {
      position: fixed;
      bottom: 14px;
      right: 16px;
      z-index: 15;
      background: rgba(0, 0, 0, 0.7);
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-family: monospace;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: 0.2s;
      user-select: none;
    }

    #hud:hover {
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      border-color: #7effc5;
    }

    #hud span { color: #7effc5; font-weight: bold; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- SETUP OVERLAY -->
  <div id="upload-overlay">
    <div class="setup-box">
      <h2>🎮 Boss Key</h2>
      <p>Pick a game, cover photo &amp; panic key</p>

      <!-- Game selector -->
      <label>🎯 Choose a game</label>
      <select id="game-selector">
        <option value="https://scratch.mit.edu/projects/345617740/embed">Scratch Platformer</option>
        <option value="https://scratch.mit.edu/projects/1053384170/embed">Scratch Adventure</option>
        <option value="https://scratch.mit.edu/projects/1026691404/embed">Scratch Minecraft</option>
        <option value="https://www.coolmathgames.com/0-run-3/embed">Run 3 (Coolmath)</option>
        <option value="https://www.coolmathgames.com/0-papas-freezeria/embed">Papa's Freezeria</option>
        <option value="https://turbowarp.org/embed">Turbowarp (Scratch but faster)</option>
      </select>

      <!-- Custom game URL -->
      <label>🔗 Or paste any game URL</label>
      <input type="text" id="custom-url" placeholder="https://example.com/game/embed" />

      <label>📷 Cover photo (notes / homework)</label>
      <input type="file" id="img-upload" accept="image/*" />

      <label>⌨️ Panic key — tap then press any key</label>
      <input type="text" id="key-display" placeholder="tap & press a key" readonly />
      <input type="hidden" id="key-code" />

      <button id="start-btn">▶ Start</button>
    </div>
  </div>

  <!-- GAME VIEW -->
  <div id="game-view">
    <iframe id="game-frame" src="https://scratch.mit.edu/projects/345617740/embed" allowtransparency="true" allowfullscreen scrolling="no"></iframe>
    
    <div id="panic-btn">
      🚨 PANIC <span class="key-hint">(or press <span id="panic-key-display">?</span>)</span>
    </div>
    
    <div id="hud">🔒 <span id="hud-key">?</span> to hide</div>
  </div>

  <!-- COVER VIEW -->
  <div id="cover-view">
    <img id="cover-img" src="" alt="cover" />
  </div>

  <script>
    (function() {
      const overlay = document.getElementById('upload-overlay');
      const imgUpload = document.getElementById('img-upload');
      const keyDisplay = document.getElementById('key-display');
      const keyCode = document.getElementById('key-code');
      const startBtn = document.getElementById('start-btn');
      const coverImg = document.getElementById('cover-img');
      const coverView = document.getElementById('cover-view');
      const hudKey = document.getElementById('hud-key');
      const panicBtn = document.getElementById('panic-btn');
      const panicKeyDisplay = document.getElementById('panic-key-display');
      const iframe = document.getElementById('game-frame');
      const gameSelector = document.getElementById('game-selector');
      const customUrl = document.getElementById('custom-url');

      let panicKey = '';
      let coverVisible = false;
      let isActive = false;

      // Update game when selector changes
      gameSelector.addEventListener('change', function() {
        if (this.value) {
          customUrl.value = '';
          iframe.src = this.value;
        }
      });

      // Update game when custom URL changes
      customUrl.addEventListener('change', function() {
        if (this.value) {
          gameSelector.value = '';
          iframe.src = this.value;
        }
      });

      // ----- capture panic key -----
      keyDisplay.addEventListener('keydown', (e) => {
        e.preventDefault();
        const key = e.key;
        let display = key;
        if (key === ' ') display = 'SPACE';
        else if (key === 'Escape') display = 'ESC';
        else if (key === 'Control') display = 'CTRL';
        else if (key === 'Shift') display = 'SHIFT';
        else if (key === 'Alt') display = 'ALT';
        else if (key === 'Meta') display = 'WIN';
        else display = key.toUpperCase();

        keyDisplay.value = display;
        keyCode.value = key;
        panicKey = key;
        hudKey.textContent = display;
        panicKeyDisplay.textContent = display;
      });

      // ----- toggle cover function -----
      function toggleCover() {
        if (!isActive) return;
        coverVisible = !coverVisible;
        coverView.style.display = coverVisible ? 'block' : 'none';
        
        panicBtn.innerHTML = coverVisible ? 
          '📚 SHOW GAME <span class="key-hint">(or press <span id="panic-key-display">' + panicKeyDisplay.textContent + '</span>)</span>' :
          '🚨 PANIC <span class="key-hint">(or press <span id="panic-key-display">' + panicKeyDisplay.textContent + '</span>)</span>';
      }

      // ----- start button -----
      startBtn.addEventListener('click', () => {
        const file = imgUpload.files[0];
        const key = keyCode.value;

        // Get game URL from selector or custom
        let gameUrl = gameSelector.value;
        if (customUrl.value) {
          gameUrl = customUrl.value;
        }

        if (!gameUrl) {
          alert('🎯 Please select a game or paste a URL!');
          return;
        }

        if (!file) {
          alert('📷 Please upload a cover photo first!');
          return;
        }
        if (!key) {
          alert('⌨️ Tap the panic key box and press a key!');
          return;
        }

        // Set the game
        iframe.src = gameUrl;

        panicKey = key;
        hudKey.textContent = key === ' ' ? 'SPACE' : key.toUpperCase();
        panicKeyDisplay.textContent = key === ' ' ? 'SPACE' : key.toUpperCase();
        isActive = true;

        const reader = new FileReader();
        reader.onload = (ev) => {
          coverImg.src = ev.target.result;
          overlay.style.display = 'none';
          coverVisible = false;
          coverView.style.display = 'none';
        };
        reader.readAsDataURL(file);
      });

      // ----- CLICKABLE PANIC BUTTON -----
      panicBtn.addEventListener('click', toggleCover);
      document.getElementById('hud').addEventListener('click', toggleCover);

      // ----- KEYBOARD FALLBACK -----
      document.addEventListener('keydown', (e) => {
        if (!isActive || overlay.style.display !== 'none') return;
        if (e.key === panicKey) {
          e.preventDefault();
          toggleCover();
        }
      });

      console.log('✅ Boss key ready! Pick any game!');
    })();
  </script>

</body>
</html>
